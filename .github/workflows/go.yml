name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # resource 目录执行 npm install 和 build
      - name: Install frontend deps
        working-directory: resource
        run: npm install

      - name: Build frontend
        working-directory: resource
        run: npm run build

      # 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # 执行 make（go build）
      - name: Build Go project
        run: make
