name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # resource 目录执行 npm install 和 build
      - name: Install frontend deps
        working-directory: resources
        run: npm install

      - name: Build frontend
        working-directory: resources
        run: npm run build

      # 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # 执行 make（go build）
      - name: Build Go project
        run: make
          # 👇 新增：上传发布编译后的二进制文件 gpm
      - name: Upload binary gpm
        uses: actions/upload-artifact@v4
        with:
          name: gpm_linux_amd64
          path: gpm  # 你指定的二进制文件路径
          if-no-files-found: error # 如果文件不存在，直接报错，方便排查
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./gpm
          name: Release ${{ github.sha }}
          tag_name: v${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
